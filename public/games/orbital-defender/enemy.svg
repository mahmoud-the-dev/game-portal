<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <radialGradient id="hullGradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff6666" />
            <stop offset="70%" stop-color="#aa0000" />
            <stop offset="100%" stop-color="#550000" />
        </radialGradient>
        <linearGradient id="trimGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffaaaa" />
            <stop offset="100%" stop-color="#ff0000" />
        </linearGradient>
        <filter id="enemyGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base Hull -->
    <polygon points="50,15 85,50 65,85 35,85 15,50" fill="url(#hullGradient)" stroke="#ffaaaa" stroke-width="2" />

    <!-- Side Appendages -->
    <polygon points="15,50 5,60 25,65" fill="url(#trimGradient)" stroke="#ffffff" stroke-width="1.5" />
    <polygon points="85,50 95,60 75,65" fill="url(#trimGradient)" stroke="#ffffff" stroke-width="1.5" />

    <!-- Central Eye / Core -->
    <circle cx="50" cy="50" r="12" fill="#ffff00" filter="url(#enemyGlow)" />
    <circle cx="50" cy="50" r="5" fill="#ffffff" />

    <!-- Engine Glow (Rear) -->
    <path d="M 40 85 L 60 85 L 55 95 L 45 95 Z" fill="#ff8800" filter="url(#enemyGlow)" />

    <!-- Front Spikes -->
    <polygon points="45,15 50,5 55,15" fill="#ffaaaa" />
</svg>
