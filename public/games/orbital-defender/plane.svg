<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a3b4c" />
      <stop offset="50%" stop-color="#4a6b8c" />
      <stop offset="100%" stop-color="#2a3b4c" />
    </linearGradient>
    <linearGradient id="wingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2b3c" />
      <stop offset="100%" stop-color="#3a5b7c" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Left Wing -->
  <path d="M 50 40 L 20 60 L 20 80 L 50 65 Z" fill="url(#wingGradient)" stroke="#5a7b9c" stroke-width="1.5" />
  
  <!-- Right Wing -->
  <path d="M 50 40 L 80 60 L 80 80 L 50 65 Z" fill="url(#wingGradient)" stroke="#5a7b9c" stroke-width="1.5" />
  
  <!-- Main Fuselage -->
  <path d="M 50 15 L 60 50 L 55 90 L 45 90 L 40 50 Z" fill="url(#bodyGradient)" stroke="#5a7b9c" stroke-width="2" />
  
  <!-- Cockpit -->
  <ellipse cx="50" cy="45" rx="4" ry="12" fill="#00ffff" filter="url(#glow)" stroke="#ffffff" stroke-width="0.5" />
  
  <!-- Engine Glow (Rear) -->
  <path d="M 45 90 L 55 90 L 52 98 L 48 98 Z" fill="#ff4400" filter="url(#glow)" />
  
  <!-- Wing Guns -->
  <rect x="23" y="55" width="2" height="15" fill="#888888" />
  <rect x="75" y="55" width="2" height="15" fill="#888888" />
  
  <!-- Nose Gun -->
  <rect x="49" y="5" width="2" height="10" fill="#aaaaaa" />
</svg>
