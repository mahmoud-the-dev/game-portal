<!DOCTYPE html>
<html class="dark" lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
			name="viewport"
		/>
		<title>Elemental Merge Drop</title>
		<link href="https://fonts.googleapis.com" rel="preconnect" />
		<link
			crossorigin=""
			href="https://fonts.gstatic.com"
			rel="preconnect"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
			rel="stylesheet"
		/>

		<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
		<script>
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						colors: {
							primary: "#2b6cee",
							"background-light": "#f6f6f8",
							"background-dark": "#101622",
							"card-dark": "#1a2230",
						},
						fontFamily: {
							display: ["Space Grotesk", "sans-serif"],
						},
					},
				},
			};
		</script>
		<script type="module" crossorigin src="./assets/index-97wd54qn.js"></script>
		<link rel="stylesheet" crossorigin href="./assets/index-CSmfmK9_.css">
	</head>
	<body
		class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden touch-none select-none"
	>
		<!-- Game View -->
		<div id="game-view" class="flex flex-col h-screen w-full relative">
			<!-- Header -->
			<header
				class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-4 py-3 z-20 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-sm"
			>
				<div class="flex items-center gap-2">
					<div
						class="size-8 rounded-lg bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/30"
					>
						<span class="material-symbols-outlined text-xl"
							>category</span
						>
					</div>
					<h1 class="text-lg sm:text-xl font-bold tracking-tight">
						Elemental Merge Drop
					</h1>
				</div>
				<button
					id="btn-gallery-open"
					class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors text-sm font-semibold"
				>
					<span class="material-symbols-outlined text-lg"
						>grid_view</span
					>
					<span class="hidden sm:inline">Gallery</span>
				</button>
			</header>

			<!-- Main Area -->
			<main
				class="flex-1 relative flex flex-col items-center pb-2 pt-2 px-2 overflow-hidden w-full h-full max-w-3xl mx-auto"
			>
				<!-- Game Canvas Container -->
				<div
					id="canvas-container"
					class="w-full relative flex justify-center items-start p-0 mb-4 flex-1 min-h-0"
				>
					<!-- The explicitly sized box that holds everything game-related correctly -->
					<div
						id="game-bounds"
						class="relative game-container rounded-xl overflow-hidden cursor-crosshair touch-none w-full max-w-[500px] h-full"
						style="
							aspect-ratio: 9/16;
							max-height: 100%;
							border: 1px solid rgba(255, 255, 255, 0.05);
						"
					>
						<!-- Render canvas strictly matched to this parent -->
						<canvas
							id="game-canvas"
							class="z-[10] w-full h-full block touch-none"
						></canvas>

						<!-- Line indicator for drop -->
						<div
							id="drop-indicator"
							class="absolute top-0 bottom-0 pointer-events-none border-l-2 border-dashed border-white/30 hidden z-[20] flex-col items-center justify-start"
						>
							<div
								id="drop-preview"
								class="absolute top-4 rounded-full shadow-[0_0_20px_rgba(255,255,255,0.4)] z-[20] flex items-center justify-center"
							>
								<span
									id="drop-preview-icon"
									class="material-symbols-outlined text-white drop-shadow-md pb-0.5"
								></span>
							</div>
						</div>

						<!-- Limit Line -->
						<div
							id="limit-line"
							class="absolute left-0 right-0 w-full z-[15] border-t-2 border-dashed border-red-500/70"
							style="top: 15%"
						></div>

						<!-- HUD Overlay: Single Row -->
						<div
							id="game-hud"
							class="absolute top-2 left-2 right-2 flex justify-between items-start z-[30] pointer-events-none transition-opacity duration-300"
						>
							<!-- Left: Score & Best -->
							<div class="flex gap-1 sm:gap-2">
								<div
									class="bg-card-dark/80 backdrop-blur-md border border-slate-700 rounded-lg p-1.5 flex flex-col items-center min-w-[50px] sm:min-w-[60px]"
								>
									<span
										class="text-[8px] sm:text-[9px] uppercase tracking-wider text-slate-400 font-semibold mb-0.5"
										>Score</span
									>
									<span
										id="score-display"
										class="text-xs sm:text-sm font-bold text-white leading-none"
										>0</span
									>
								</div>
								<div
									class="bg-card-dark/80 backdrop-blur-md border border-slate-700 rounded-lg p-1.5 flex flex-col items-center min-w-[40px] sm:min-w-[50px] opacity-90"
								>
									<span
										class="text-[8px] sm:text-[9px] uppercase tracking-wider text-slate-500 font-semibold mb-0.5"
										>Best</span
									>
									<span
										id="highscore-display"
										class="text-[10px] sm:text-xs font-bold text-slate-300 leading-none"
										>0</span
									>
								</div>
							</div>

							<!-- Right: Next & Restart -->
							<div class="flex gap-1 sm:gap-2 items-center">
								<div
									class="bg-card-dark/80 backdrop-blur-md border border-slate-700 rounded-lg py-1 px-2 flex gap-1 sm:gap-2 items-center"
								>
									<span
										class="text-[8px] sm:text-[9px] uppercase tracking-wider text-slate-400 font-semibold"
										>Next</span
									>
									<div
										id="next-preview-container"
										class="size-6 flex items-center justify-center relative pointer-events-none"
									></div>
								</div>
								<button
									id="btn-restart"
									class="pointer-events-auto size-7 sm:size-8 bg-red-500/20 text-red-400 hover:bg-red-500/40 rounded-lg border border-red-500/20 flex items-center justify-center cursor-pointer shadow-sm"
								>
									<span
										class="material-symbols-outlined text-[14px] sm:text-sm"
										>refresh</span
									>
								</button>
							</div>
						</div>
					</div>
				</div>

				<!-- Game Over Overlay -->
				<div
					id="game-over-screen"
					class="absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300"
				>
					<h2 class="text-4xl font-bold text-white mb-2">
						Game Over
					</h2>
					<p class="text-lg text-slate-300 mb-6 font-medium">
						Box is full!
					</p>
					<div class="flex gap-4">
						<button
							id="btn-play-again"
							class="px-6 py-3 bg-primary text-white rounded-xl font-bold text-lg hover:bg-blue-600 transition-colors shadow-lg shadow-primary/30"
						>
							Play Again
						</button>
						<button
							id="btn-go-gallery-go"
							class="px-4 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors border border-slate-700"
						>
							Gallery
						</button>
					</div>
				</div>
			</main>
		</div>

		<!-- Gallery View -->
		<div
			id="gallery-view"
			class="hidden flex-col h-screen w-full relative bg-background-dark z-50 overflow-y-auto"
		>
			<header
				class="sticky top-0 z-50 border-b border-slate-800 bg-background-dark/95 backdrop-blur-sm px-4 py-3"
			>
				<div class="flex items-center justify-between">
					<button
						id="btn-gallery-close"
						class="flex items-center gap-2 text-slate-400 hover:text-primary transition-colors"
					>
						<span class="material-symbols-outlined"
							>arrow_back</span
						>
						<span class="font-medium hidden sm:inline">Back</span>
					</button>
					<h2 class="text-lg font-bold">Discovery Log</h2>
					<div class="w-16"></div>
					<!-- spacer -->
				</div>
			</header>

			<main class="flex-grow w-full max-w-5xl mx-auto px-4 py-6">
				<div
					class="bg-card-dark rounded-xl p-5 shadow-sm border border-slate-800 mb-8"
				>
					<div class="flex justify-between items-center mb-3">
						<div>
							<h3 class="text-xl font-bold text-white">
								Collection Progress
							</h3>
							<p class="text-slate-400 text-sm">
								Merge shapes to unlock higher tiers.
							</p>
						</div>
						<div class="text-right">
							<span
								id="gallery-unlocked-count"
								class="text-2xl font-bold text-primary"
								>1</span
							>
							<span
								id="gallery-total-count"
								class="text-slate-500 font-medium"
								>/ 11</span
							>
						</div>
					</div>
					<!-- Progress Bar -->
					<div
						class="h-3 w-full bg-slate-800 rounded-full overflow-hidden"
					>
						<div
							id="gallery-progress-bar"
							class="h-full bg-primary transition-all duration-1000"
							style="width: 0%"
						></div>
					</div>
				</div>

				<!-- Grid -->
				<div
					id="gallery-grid"
					class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"
				>
					<!-- Dynamically populated -->
				</div>
			</main>
		</div>

	</body>
</html>
